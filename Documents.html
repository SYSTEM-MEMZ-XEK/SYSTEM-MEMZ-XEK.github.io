<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文档</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
            animation: fadeIn 0.5s ease-in-out; /* 加载动画 */
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 2em;
            color: #4A90E2;
            text-align: center;
            margin-top: 0;
        }

        ul {
            list-style-type: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .game-item {
            margin: 20px 0;
            width: 100%;
            max-width: 600px; /* 限制最大宽度 */
            text-align: center;
        }

        .game-item img {
            width: 100%;
            border-radius: 5px;
            max-width: 100%; /* 图片最大宽度 */
        }

        .game-item a {
            text-decoration: none;
            color: #333;
            display: block; /* 使链接块元素化，方便点击 */
            transition: color 0.3s;
        }

        .game-item a:hover {
            color: #4A90E2; /* 悬停时颜色变化 */
        }

        footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.9em;
            color: #777;
        }
    </style>
</head>
<body>
    <h1>文档</h1>
    <ul>
        <li class="game-item">
            <a href="Documents/如何在GitHub上建立自己的网站.html">
                <img src="images/如何在GitHub上建立自己的网站.png" alt="如何在GitHub上建立自己的网站">

            </a>
        </li>
        <li class="game-item">
            <a href="Documents/如何优化你的GitHub博客.html">
                <img src="images/如何优化你的GitHub博客.png" alt="如何优化你的GitHub博客">
                如何优化你的GitHub博客（未上线）
            </a>
        </li>
    </ul>
    <footer style="text-align: center;">
        <p>© 2024 SYSTEM-MEMZ-XEK</p>
    </footer>
</body>
</html>
